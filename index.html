<!DOCTYPE html>
<html>
<head>
<title>Simple E-Commerce Store</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());

gtag('config', 'G-XXXXXXXXXX', {
debug_mode: true
});
</script>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

h1{
background:black;
color:white;
padding:15px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.product{
background:white;
padding:15px;
width:200px;
border-radius:8px;
box-shadow:0 0 5px gray;
}

button{
padding:8px 12px;
margin:5px;
border:none;
background:green;
color:white;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

.section{
margin-top:30px;
background:white;
padding:20px;
width:60%;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 5px gray;
}

</style>
</head>

<body>

<h1>My E-Commerce Store</h1>

<div class="products" id="productList"></div>

<div class="section">
<h2>Cart</h2>
<ul id="cart"></ul>
<button onclick="placeOrder()">Place Order</button>
</div>

<div class="section">
<h2>Wishlist</h2>
<ul id="wishlist"></ul>
</div>

<script>

const DEBUG = true;

function debugLog(msg){
if(DEBUG){
console.log("DEBUG:",msg);
}
}

const products=[
{id:1,name:"Shoes",price:50},
{id:2,name:"T-Shirt",price:25},
{id:3,name:"Watch",price:120},
{id:4,name:"Bag",price:40}
];

let cart=[];
let wishlist=[];


// Load Products
function loadProducts(){

const container=document.getElementById("productList");

products.forEach(product=>{

const div=document.createElement("div");
div.className="product";

div.innerHTML=`
<h3>${product.name}</h3>
<p>Price: $${product.price}</p>

<button onclick="addToCart(${product.id})">Add to Cart</button>
<button onclick="addToWishlist(${product.id})">Wishlist</button>
`;

container.appendChild(div);

});

debugLog("Products loaded");

}


// Add To Cart
function addToCart(id){

const product=products.find(p=>p.id===id);

cart.push(product);

debugLog(product.name+" added to cart");

renderCart();

gtag('event','add_to_cart',{
item_name:product.name,
price:product.price
});

}


// Add To Wishlist
function addToWishlist(id){

const product=products.find(p=>p.id===id);

wishlist.push(product);

debugLog(product.name+" added to wishlist");

renderWishlist();

gtag('event','add_to_wishlist',{
item_name:product.name
});

}


// Render Cart
function renderCart(){

const cartList=document.getElementById("cart");
cartList.innerHTML="";

cart.forEach(item=>{

const li=document.createElement("li");
li.textContent=item.name+" - $"+item.price;

cartList.appendChild(li);

});

}


// Render Wishlist
function renderWishlist(){

const wish=document.getElementById("wishlist");
wish.innerHTML="";

wishlist.forEach(item=>{

const li=document.createElement("li");
li.textContent=item.name;

wish.appendChild(li);

});

}


// Place Order
function placeOrder(){

if(cart.length===0){
alert("Cart is empty!");
return;
}

debugLog("Order placed");

gtag('event','purchase',{
value:cart.length
});

alert("Order placed successfully!");

cart=[];
renderCart();

}


// Start App
loadProducts();

</script>

</body>
</html>
